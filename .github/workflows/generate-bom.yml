name: Auto-Generate BOM
on:
  push:
    branches: [ main ]
jobs:
  update-bom:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run BOM Script
        run: python generate_bom.py

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Auto-update BOM [skip ci]"
          file_pattern: 'bom.md print_settings.json archives/*.zip'
