name: Generate STL BOM

on:
  push:
    paths:
      - "stl/**"
      - "generate_bom.py"
  workflow_dispatch:

jobs:
  generate-bom:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate bom.md
        run: python3 generate_bom.py

      - name: Commit bom.md if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git status --porcelain | grep bom.md; then
            git add bom.md
            git commit -m "chore: update STL BOM"
            git push
          else
            echo "No changes in bom.md"
          fi
