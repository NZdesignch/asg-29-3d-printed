name: Generate STL BOM

on:
  push:
    paths:
      - "stl/**"
      - "print_settings.json"
      - "generate_bom.py"
  workflow_dispatch:

jobs:
  generate-bom:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate BOM and sync print settings
        run: python3 generate_bom.py

      - name: Commit changes if needed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git status --porcelain | grep -E "bom.md|print_settings.json"; then
            git add bom.md print_settings.json
            git commit -m "chore: update BOM and print settings"
            git push
          else
            echo "No changes to commit"
          fi
